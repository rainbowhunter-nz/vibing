name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Lint and format
        run: |
          for d in apps/api packages/protocol packages/host_runtime packages/devcontainer_runtime; do
            ( cd "$d" && uv run ruff check . && uv run ruff format --check . )
          done
      - name: Type-check (apps/api)
        run: cd apps/api && uv run mypy src
      - name: Test
        run: |
          for d in apps/api packages/host_runtime packages/devcontainer_runtime; do
            ( cd "$d" && uv run pytest -q )
          done

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
