[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

# Local control socket so `supervisorctl status` works inside the container.
[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:control-plane]
command=uv run --no-dev --frozen uvicorn vibing_api.main:app --host 0.0.0.0 --port 8080
directory=/repo
autorestart=false
startsecs=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:host-runtime]
command=uv run --no-dev --frozen vibing runtime host --control-plane-url %(ENV_VIBING_CONTROL_PLANE_URL)s --agent-control-plane-url %(ENV_VIBING_AGENT_CONTROL_PLANE_URL)s
directory=/repo
autorestart=false
startsecs=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

# Fail-fast: if any program exits or goes fatal, SIGTERM supervisord so the container stops.
[eventlistener:fail-fast]
command=bash -c "printf 'READY\n'; while read -r line; do kill -SIGTERM \"$PPID\"; done"
events=PROCESS_STATE_EXITED,PROCESS_STATE_FATAL,PROCESS_STATE_STOPPED
