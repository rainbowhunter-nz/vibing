[project]
name = "vibing-host-runtime"
version = "0.1.0"
description = "Host-side runtime skeleton for the Vibing MVP."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.0",
    "vibing-protocol",
]

[dependency-groups]
dev = ["pytest>=9.0.3", "ruff>=0.15.14"]

[tool.uv.sources]
vibing-protocol = { path = "../protocol", editable = true }

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.pytest.ini_options]
testpaths = ["tests"]
